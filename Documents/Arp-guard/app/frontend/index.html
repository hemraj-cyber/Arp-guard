<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARP Guard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: 'hsl(0,0%,4%)',
            card: 'hsl(0,0%,7%)',
            border: 'hsl(0,0%,15%)',
            primary: 'hsl(211,100%,50%)',
            muted: 'hsl(0,0%,10%)',
            destructive: 'hsl(0,100%,60%)',
          },
          fontFamily: { mono: ['JetBrains Mono', 'monospace'] }
        }
      }
    }
  </script>
  <style>
    body { background: hsl(0,0%,4%); color: white; font-family: 'JetBrains Mono', monospace; }
    .toast { position: fixed; top: 1rem; right: 1rem; z-index: 9999; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const BACKEND_URL = 'http://localhost:8000';
    axios.defaults.withCredentials = true;

    const AuthContext = React.createContext();
    const useAuth = () => React.useContext(AuthContext);

    function Toast({ message, type, onClose }) {
      React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      return (
        <div className={`toast p-4 border text-sm font-mono ${type === 'error' ? 'bg-red-950 border-red-600 text-red-400' : 'bg-green-950 border-green-600 text-green-400'}`}>
          {message}
        </div>
      );
    }

    function AuthProvider({ children }) {
      const [user, setUser] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [toast, setToast] = React.useState(null);

      const showToast = (message, type = 'success') => setToast({ message, type });

      React.useEffect(() => {
        axios.get(`${BACKEND_URL}/api/auth/me`)
          .then(r => setUser(r.data))
          .catch(() => setUser(false))
          .finally(() => setLoading(false));
      }, []);

      const login = async (email, password) => {
        const { data } = await axios.post(`${BACKEND_URL}/api/auth/login`, { email, password });
        setUser(data);
        return data;
      };

      const register = async (name, email, password) => {
        const { data } = await axios.post(`${BACKEND_URL}/api/auth/register`, { name, email, password });
        setUser(data);
        return data;
      };

      const logout = async () => {
        await axios.post(`${BACKEND_URL}/api/auth/logout`);
        setUser(false);
      };

      return (
        <AuthContext.Provider value={{ user, loading, login, register, logout, showToast }}>
          {children}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </AuthContext.Provider>
      );
    }

    function Login({ onNavigate }) {
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [error, setError] = React.useState('');
      const { login } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        try {
          await login(email, password);
        } catch (err) {
          setError(err.response?.data?.detail || 'Invalid credentials');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center" style={{background:'hsl(0,0%,4%)'}}>
          <div className="w-full max-w-sm p-8 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
            <div className="flex items-center space-x-2 mb-8">
              <span className="text-2xl">🛡️</span>
              <h1 className="text-xl font-bold tracking-widest uppercase" style={{color:'hsl(211,100%,50%)'}}>ARP GUARD</h1>
            </div>
            <h2 className="text-lg font-bold text-white mb-6">Sign in to Control Room</h2>
            {error && <div className="p-3 mb-4 text-sm border" style={{background:'rgba(255,0,0,0.1)', borderColor:'hsl(0,100%,60%)', color:'hsl(0,100%,60%)'}}>{error}</div>}
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-xs font-bold tracking-widest uppercase mb-1" style={{color:'hsl(0,0%,64%)'}}>Email</label>
                <input type="email" required value={email} onChange={e => setEmail(e.target.value)}
                  className="w-full px-3 py-2 text-sm text-white border outline-none"
                  style={{background:'hsl(0,0%,4%)', borderColor:'hsl(0,0%,15%)'}} />
              </div>
              <div>
                <label className="block text-xs font-bold tracking-widest uppercase mb-1" style={{color:'hsl(0,0%,64%)'}}>Password</label>
                <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                  className="w-full px-3 py-2 text-sm text-white border outline-none"
                  style={{background:'hsl(0,0%,4%)', borderColor:'hsl(0,0%,15%)'}} />
              </div>
              <button type="submit" className="w-full py-2 text-xs font-bold tracking-widest uppercase text-white"
                style={{background:'hsl(211,100%,50%)'}}>
                Authenticate
              </button>
            </form>
            <p className="mt-4 text-xs" style={{color:'hsl(0,0%,64%)'}}>
              No account? <button onClick={() => onNavigate('register')} className="font-bold" style={{color:'hsl(211,100%,50%)'}}>Register</button>
            </p>
          </div>
        </div>
      );
    }

    function Register({ onNavigate }) {
      const [name, setName] = React.useState('');
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [error, setError] = React.useState('');
      const { register } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        try {
          await register(name, email, password);
        } catch (err) {
          setError(err.response?.data?.detail || 'Registration failed');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center" style={{background:'hsl(0,0%,4%)'}}>
          <div className="w-full max-w-sm p-8 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
            <div className="flex items-center space-x-2 mb-8">
              <span className="text-2xl">🛡️</span>
              <h1 className="text-xl font-bold tracking-widest uppercase" style={{color:'hsl(211,100%,50%)'}}>ARP GUARD</h1>
            </div>
            <h2 className="text-lg font-bold text-white mb-6">Create Account</h2>
            {error && <div className="p-3 mb-4 text-sm border" style={{background:'rgba(255,0,0,0.1)', borderColor:'hsl(0,100%,60%)', color:'hsl(0,100%,60%)'}}>{error}</div>}
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-xs font-bold tracking-widest uppercase mb-1" style={{color:'hsl(0,0%,64%)'}}>Name</label>
                <input type="text" required value={name} onChange={e => setName(e.target.value)}
                  className="w-full px-3 py-2 text-sm text-white border outline-none"
                  style={{background:'hsl(0,0%,4%)', borderColor:'hsl(0,0%,15%)'}} />
              </div>
              <div>
                <label className="block text-xs font-bold tracking-widest uppercase mb-1" style={{color:'hsl(0,0%,64%)'}}>Email</label>
                <input type="email" required value={email} onChange={e => setEmail(e.target.value)}
                  className="w-full px-3 py-2 text-sm text-white border outline-none"
                  style={{background:'hsl(0,0%,4%)', borderColor:'hsl(0,0%,15%)'}} />
              </div>
              <div>
                <label className="block text-xs font-bold tracking-widest uppercase mb-1" style={{color:'hsl(0,0%,64%)'}}>Password</label>
                <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                  className="w-full px-3 py-2 text-sm text-white border outline-none"
                  style={{background:'hsl(0,0%,4%)', borderColor:'hsl(0,0%,15%)'}} />
              </div>
              <button type="submit" className="w-full py-2 text-xs font-bold tracking-widest uppercase text-white"
                style={{background:'hsl(211,100%,50%)'}}>
                Register
              </button>
            </form>
            <p className="mt-4 text-xs" style={{color:'hsl(0,0%,64%)'}}>
              Have account? <button onClick={() => onNavigate('login')} className="font-bold" style={{color:'hsl(211,100%,50%)'}}>Login</button>
            </p>
          </div>
        </div>
      );
    }

    function Dashboard() {
      const { user, logout, showToast } = useAuth();
      const [alerts, setAlerts] = React.useState([]);
      const [stats, setStats] = React.useState(null);
      const [capturing, setCapturing] = React.useState(false);
      const [uploading, setUploading] = React.useState(false);
      const fileRef = React.useRef();
      const chartRef = React.useRef();
      const chartInstance = React.useRef();

      const fetchAlerts = async () => {
        try {
          const { data } = await axios.get(`${BACKEND_URL}/api/alerts`);
          setAlerts(data);
        } catch (e) { showToast('Failed to load logs', 'error'); }
      };

      const fetchStats = async () => {
        try {
          const { data } = await axios.get(`${BACKEND_URL}/api/stats`);
          setStats(data);
        } catch (e) {}
      };

      React.useEffect(() => {
        fetchAlerts();
        fetchStats();
        const interval = setInterval(() => { fetchAlerts(); fetchStats(); }, 15000);
        return () => clearInterval(interval);
      }, []);

      React.useEffect(() => {
        if (stats && chartRef.current) {
          if (chartInstance.current) chartInstance.current.destroy();
          const ctx = chartRef.current.getContext('2d');
          chartInstance.current = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: Object.keys(stats.by_type),
              datasets: [{
                data: Object.values(stats.by_type),
                backgroundColor: ['#ff3333', '#ff9933', '#ffcc33', '#33ccff', '#9933ff']
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { labels: { color: '#fff', font: { family: 'JetBrains Mono' } } } }
            }
          });
        }
      }, [stats]);

      const handleUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        setUploading(true);
        try {
          const { data } = await axios.post(`${BACKEND_URL}/api/pcap/upload`, formData);
          showToast(`Analysis complete. Found ${data.alerts_found} alerts.`);
          fetchAlerts();
          fetchStats();
        } catch (err) {
          showToast(err.response?.data?.detail || 'Upload failed', 'error');
        } finally { setUploading(false); e.target.value = ''; }
      };

      const handleCapture = async () => {
        setCapturing(true);
        try {
          await axios.post(`${BACKEND_URL}/api/network/capture`);
          showToast('Capture complete');
          fetchAlerts();
          fetchStats();
        } catch (err) {
          showToast('Capture failed', 'error');
        } finally { setCapturing(false); }
      };

      const clearAll = async () => {
        if (!confirm('Clear all alerts?')) return;
        try {
          await axios.delete(`${BACKEND_URL}/api/alerts`);
          fetchAlerts();
          fetchStats();
          showToast('All alerts cleared');
        } catch (e) {
          showToast('Failed to clear', 'error');
        }
      };

      return (
        <div className="min-h-screen flex flex-col" style={{background:'hsl(0,0%,4%)'}}>
          <header className="px-6 py-4 flex items-center justify-between border-b" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
            <div className="flex items-center space-x-3">
              <span>🛡️</span>
              <h1 className="font-bold text-lg tracking-widest uppercase" style={{color:'hsl(211,100%,50%)'}}>ARP GUARD :: CONTROL</h1>
            </div>
            <div className="flex items-center space-x-4">
              <span className="text-xs" style={{color:'hsl(0,0%,64%)'}}>{user?.email}</span>
              <button onClick={logout} className="text-xs font-bold tracking-widest uppercase" style={{color:'hsl(0,0%,64%)'}}>
                🔌 Disconnect
              </button>
            </div>
          </header>

          <main className="flex-1 p-6 space-y-6">
            {/* Stats Cards */}
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div className="p-6 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
                <div className="text-xs font-bold tracking-widest uppercase mb-2" style={{color:'hsl(0,0%,64%)'}}>Total Threats</div>
                <div className="text-3xl font-bold text-white">{stats?.total || 0}</div>
              </div>
              <div className="p-6 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
                <div className="text-xs font-bold tracking-widest uppercase mb-2" style={{color:'hsl(0,0%,64%)'}}>Critical</div>
                <div className="text-3xl font-bold" style={{color:'hsl(0,100%,60%)'}}>{stats?.critical || 0}</div>
              </div>
              <div className="p-6 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
                <div className="text-xs font-bold tracking-widest uppercase mb-2" style={{color:'hsl(0,0%,64%)'}}>High</div>
                <div className="text-3xl font-bold" style={{color:'#ff9933'}}>{stats?.high || 0}</div>
              </div>
              <div className="p-6 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
                <div className="text-xs font-bold tracking-widest uppercase mb-2" style={{color:'hsl(0,0%,64%)'}}>Medium</div>
                <div className="text-3xl font-bold" style={{color:'#ffcc33'}}>{stats?.medium || 0}</div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              {/* Chart */}
              <div className="p-6 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
                <h2 className="text-xs font-bold tracking-widest uppercase mb-4" style={{color:'hsl(0,0%,64%)'}}>Threats by Type</h2>
                <div style={{height:'250px'}}>
                  <canvas ref={chartRef}></canvas>
                </div>
              </div>

              {/* Upload */}
              <div className="p-6 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
                <h2 className="text-xs font-bold tracking-widest uppercase mb-4" style={{color:'hsl(0,0%,64%)'}}>TACTICAL UPLOAD</h2>
                <div onClick={() => fileRef.current.click()}
                  className="border-2 border-dashed p-8 text-center cursor-pointer"
                  style={{borderColor:'hsl(0,0%,15%)'}}>
                  <div className="text-3xl mb-2">☁️</div>
                  <p className="text-sm font-bold text-white mb-1">{uploading ? 'Analyzing...' : 'DROP PCAP FILE'}</p>
                  <p className="text-xs" style={{color:'hsl(0,0%,64%)'}}>or click to browse</p>
                </div>
                <input ref={fileRef} type="file" accept=".pcap,.pcapng" onChange={handleUpload} className="hidden" />
              </div>

              {/* Capture */}
              <div className="p-6 border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
                <h2 className="text-xs font-bold tracking-widest uppercase mb-4" style={{color:'hsl(0,0%,64%)'}}>LIVE INTERCEPT</h2>
                <button onClick={handleCapture} disabled={capturing}
                  className="w-full py-3 text-xs font-bold tracking-widest uppercase text-white disabled:opacity-50 mb-4"
                  style={{background:'hsl(0,100%,60%)'}}>
                  {capturing ? '⟳ Sniffing...' : '⚡ Initiate Capture'}
                </button>
                <p className="text-xs" style={{color:'hsl(0,0%,64%)'}}>Engages scapy sniff sequence for real-time anomaly detection.</p>
              </div>
            </div>

            {/* Alerts Table */}
            <div className="border" style={{background:'hsl(0,0%,7%)', borderColor:'hsl(0,0%,15%)'}}>
              <div className="px-4 py-3 border-b flex justify-between items-center" style={{borderColor:'hsl(0,0%,15%)'}}>
                <h2 className="text-xs font-bold tracking-widest uppercase" style={{color:'hsl(0,0%,64%)'}}>THREAT LOGS ({alerts.length})</h2>
                <div className="flex space-x-3">
                  <button onClick={fetchAlerts} className="text-xs" style={{color:'hsl(211,100%,50%)'}}>↻ Refresh</button>
                  <button onClick={clearAll} className="text-xs font-bold" style={{color:'hsl(0,100%,60%)'}}>🗑 Clear All</button>
                </div>
              </div>
              <div className="overflow-auto" style={{maxHeight:'400px'}}>
                {alerts.length === 0 ? (
                  <div className="h-64 flex flex-col items-center justify-center p-8 text-center" style={{color:'hsl(0,0%,64%)'}}>
                    <div className="text-4xl mb-4 opacity-30">🛡️</div>
                    <p className="text-sm font-bold tracking-widest uppercase">No anomalies detected</p>
                  </div>
                ) : (
                  <table className="w-full text-sm text-left">
                    <thead className="text-xs uppercase sticky top-0 border-b" style={{background:'hsl(0,0%,10%)', color:'hsl(0,0%,64%)', borderColor:'hsl(0,0%,15%)'}}>
                      <tr>
                        <th className="px-6 py-3">Timestamp</th>
                        <th className="px-6 py-3">Threat Type</th>
                        <th className="px-6 py-3">Severity</th>
                        <th className="px-6 py-3">Details</th>
                      </tr>
                    </thead>
                    <tbody>
                      {alerts.map(alert => (
                        <tr key={alert._id} className="border-b hover:bg-opacity-50" style={{borderColor:'hsl(0,0%,15%)'}}>
                          <td className="px-6 py-4 text-xs" style={{color:'hsl(0,0%,64%)'}}>{new Date(alert.timestamp).toLocaleString()}</td>
                          <td className="px-6 py-4 font-bold text-white">{alert.type}</td>
                          <td className="px-6 py-4">
                            <span className="px-2 py-1 text-xs font-bold border"
                              style={alert.severity === 'High' || alert.severity === 'Critical'
                                ? {background:'rgba(255,0,0,0.1)', color:'hsl(0,100%,60%)', borderColor:'rgba(255,0,0,0.2)'}
                                : {background:'rgba(255,165,0,0.1)', color:'orange', borderColor:'rgba(255,165,0,0.2)'}}>
                              {alert.severity}
                            </span>
                          </td>
                          <td className="px-6 py-4 text-xs" style={{color:'hsl(0,0%,64%)'}}>{alert.message}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    function App() {
      const { user, loading } = useAuth();
      const [page, setPage] = React.useState('login');

      if (loading) return (
        <div className="h-screen flex items-center justify-center" style={{background:'hsl(0,0%,4%)', color:'hsl(211,100%,50%)'}}>
          INITIALIZING SECURE LINK...
        </div>
      );

      if (user) return <Dashboard />;
      if (page === 'register') return <Register onNavigate={setPage} />;
      return <Login onNavigate={setPage} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <AuthProvider><App /></AuthProvider>
    );
  </script>
</body>
</html>
